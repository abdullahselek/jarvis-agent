services:
  jarvis-agent:
    build: .
    container_name: jarvis-agent
    network_mode: host
    stdin_open: true
    tty: true

  test:
    build: .
    container_name: jarvis-agent-test
    network_mode: host
    command: /app/.venv/bin/python tests/test_integration.py
    volumes:
      - ./tests:/app/tests
    profiles:
      - test
