services:
  jarvis-agent:
    build: .
    container_name: jarvis-agent
    environment:
      - OLLAMA_HOST=host.docker.internal
    extra_hosts:
      - host.docker.internal:host-gateway
    stdin_open: true
    tty: true

  test:
    build: .
    container_name: jarvis-agent-test
    environment:
      - OLLAMA_HOST=host.docker.internal
    extra_hosts:
      - host.docker.internal:host-gateway
    command: python tests/test_connectivity.py
    profiles:
      - test
